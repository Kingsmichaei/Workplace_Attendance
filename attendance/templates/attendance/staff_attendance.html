{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Staff Attendance</title>
    <link rel="stylesheet" href="{% static 'attendance/dashboard.css' %}" />
</head>

<body>
    <div class="container">
        <h2>{{ user.first_name }} {{ user.last_name }} Attendance Records</h2>
        <table>
            <tr>
                <th>Date</th>
                <th>Clock In</th>
                <th>Clock Out</th>
            </tr> 
            {% for record in records %}
            <tr>
                <td>{{ record.date }}</td>
                <td>{{ record.clock_in }}</td>
                <td>{{ record.clock_out }}</td>
            </tr>
                {% empty %}
                <tr>
                    <td colspan="3">No attendance records found.</td>
                </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
